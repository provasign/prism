name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.26.3"
jobs:
  build-linux:
    name: Build linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install arm64 cross-compiler
        if: matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/provasign/prism/internal/version.Version=${{ github.ref_name }}" -o "dist/prism-${{ github.ref_name }}-linux-${{ matrix.goarch }}" ./cmd/prism
      - uses: actions/upload-artifact@v5
        with:
          name: prism-linux-${{ matrix.goarch }}
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  build-darwin:
    name: Build darwin/${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.goarch == 'amd64' && 'clang -arch x86_64' || 'clang -arch arm64' }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/provasign/prism/internal/version.Version=${{ github.ref_name }}" -o "dist/prism-${{ github.ref_name }}-darwin-${{ matrix.goarch }}" ./cmd/prism
      - uses: actions/upload-artifact@v5
        with:
          name: prism-darwin-${{ matrix.goarch }}
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  build-windows:
    name: Build windows/amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "1"
        shell: bash
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/provasign/prism/internal/version.Version=${{ github.ref_name }}" -o "dist/prism-${{ github.ref_name }}-windows-amd64.exe" ./cmd/prism
      - uses: actions/upload-artifact@v5
        with:
          name: prism-windows-amd64
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  release-meta:
    name: Checksums + install scripts
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: spdx-json
          output-file: dist/prism-${{ github.ref_name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name checksums.txt -print0 | sort -z | xargs -0 sha256sum > checksums.txt
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            install.sh
            install.ps1
            uninstall.sh
            uninstall.ps1
