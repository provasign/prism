name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.26.3"
jobs:
  release:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux;   goarch: amd64; runner: ubuntu-latest
          - goos: linux;   goarch: arm64; runner: ubuntu-latest
          - goos: darwin;  goarch: arm64; runner: macos-latest
          - goos: darwin;  goarch: amd64; runner: macos-latest
          - goos: windows; goarch: amd64; runner: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          EXT=$([ "${{ matrix.goos }}" = "windows" ] && echo ".exe" || echo "")
          go build -ldflags="-s -w" -o "dist/prism-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/prism
      - uses: actions/upload-artifact@v5
        with:
          name: prism-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
