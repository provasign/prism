        #!/usr/bin/env python3
        """Result 1 rerun: union coverage_gaps over focused queries, score vs ground truth."""
        import json, subprocess

        ROOT = "/tmp/prism-ab-bench/payflow"
        BIN = "/Users/tapabratapal/bin/prism"

        # Ground truth from AB-Test-Payflow-2026-06-12.md, keyed by (name, file-substr).
        DESIGNED = {
            ("CreatePayment", "api/handler.go"), ("GetPayment", "api/handler.go"),
            ("ListPayments", "api/handler.go"), ("RefundPayment", "api/handler.go"),
            ("CompletePayment", "api/handler.go"), ("RequireScope", "api/middleware.go"),
            ("Register", "api/router.go"), ("CompletePayment", "payment/service.go"),
            ("ListPayments", "payment/service.go"), ("ValidateCurrency", "payment"),
            ("RequireScope", "auth"), ("UpdatePayment", "storage"),
        }
        # Tested — must NEVER appear as a gap (the old run's 2 false positives + more).
        TESTED = {
            ("RevokeToken", "payment/service.go"), ("RefundPayment", "payment/service.go"),
            ("ProcessPayment", "payment/service.go"),
        }

        # 1 term per query, spanning every subsystem AND each tested function (to expose FPs).
        TERMS = ["Handler", "Middleware", "Register", "CompletePayment", "ListPayments",
                 "ValidateCurrency", "RequireScope", "UpdatePayment", "RefundPayment",
                 "RevokeToken", "ProcessPayment", "Service"]

        union = {}  # (name, file) -> file
        for t in TERMS:
            out = subprocess.run([BIN, "query", f"audit {t}", "--terms", t,
                                  "--include", "graph,coverage_gaps", "--format", "json", ROOT],
                                 capture_output=True, text=True)
            try:
                d = json.loads(out.stdout)
            except json.JSONDecodeError:
                continue
            for g in d.get("coverageGaps", []):
                union[(g.get("name"), g.get("filePath"))] = g.get("filePath")

        def matches(gapname, gapfile, key):
            n, f = key
            return gapname == n and f in (gapfile or "")

        found = set()
        for (gn, gf) in union:
            for key in DESIGNED:
                if matches(gn, gf, key):
                    found.add(key)

        false_positives = []
        for (gn, gf) in union:
            for key in TESTED:
                if matches(gn, gf, key):
                    false_positives.append((gn, gf))

        print(f"queries run            : {len(TERMS)}")
        print(f"unique gaps in union   : {len(union)}")
        print(f"designed gaps found    : {len(found)}/{len(DESIGNED)}")
        missing = DESIGNED - found
        if missing:
            print(f"  MISSED               : {sorted(missing)}")
        print(f"false positives        : {len(false_positives)}  {false_positives if false_positives else '(none — RevokeToken/RefundPayment/ProcessPayment correctly NOT flagged)'}")
        print("--- full union ---")
        for (n, f) in sorted(union):
            print(f"  {n} — {f}")
        PY
