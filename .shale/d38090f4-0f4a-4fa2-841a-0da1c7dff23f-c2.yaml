    - cmd: |-
        cd /Users/tapabratapal/Projects/provasign/shale && git add -A && git commit -m "fix: fold multi-task sessions, post-finalize remnants, and via:git ops honestly

        Found live in the prism repo (session d38090f4): the published evidence
        paired one task's intent with another task's completion note, the closing
        'shale done' raced the pre-push finalize and was then destroyed by an
        archive clobber, and every via:git file said ops:[edit] including deletions.

        - fold: a completion pairs only with the intent that precedes it; a session
          with several intent→done arcs publishes the last cycle and preserves the
          earlier ones as timestamped notes, never cross-paired, never dropped.
        - fold: events captured after a session was finalized fold into a
          continuation file (<id>-c2.yaml) when they carry task evidence; ambient
          capture alone is archived without minting one.
        - store: ArchiveSession appends when the archive already holds the session
          id — the local audit trail is never clobbered by a remnant.
        - gitx: FilesChangedSince derives write/edit/delete from git statuses
          (log --name-status + status --porcelain) instead of hardcoding edit.
        - finalize --auto-commit: say plainly that a commit created in a pre-push
          hook is not part of the push in flight and ships with the next one.

