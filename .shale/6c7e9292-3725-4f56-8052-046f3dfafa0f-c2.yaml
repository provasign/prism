        import re

        def bump(path, old_ver, new_ver, shas):
            s = open(path).read()
            s = s.replace(old_ver, new_ver)            # version line, urls, install names
            # shas: dict platform-suffix -> sha. Replace the sha256 line following each url.
            for plat, sha in shas.items():
                # find the url line for this platform, replace the next sha256 "..."
                pat = re.compile(r'(url "[^"]*'+re.escape(plat)+r'"\n\s*sha256 ")[0-9a-f]{64}(")')
                s, n = pat.subn(r'\g<1>'+sha+r'\g<2>', s)
                assert n == 1, f"{path}: {plat} matched {n} times"
            open(path,'w').write(s)
            print(f"updated {path}")

