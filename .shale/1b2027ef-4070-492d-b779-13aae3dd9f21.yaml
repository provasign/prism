        # B) HETEROGENEOUS completeness, end-to-end with Claude
        errs=[{"level":"ERROR","service":s,"msg":f"{s}: timeout {random.randint(100,900)}ms","trace_id":hex(random.getrandbits(48))} for s in SERVICES]
